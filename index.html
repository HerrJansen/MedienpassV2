                    <div className="space-y-8 text-slate-700 leading-relaxed">

                        <div>

                        <div>
                            <h4 className="font-black text-xl text-slate-800 mb-3 flex items-center gap-2"><Icon name="bot" size={24} className="text-[#BF0D3E]"/> 1. Das Geheimnis der Suchmaschine</h4>
                            <p className="text-sm mb-3 font-medium">Stell dir das Internet wie eine gigantische, chaotische Bibliothek ohne Regale vor. Eine Suchmaschine sucht nicht "live" im ganzen Internet, wenn du auf Enter drückst – das würde Tage dauern!</p>
                            <ul className="list-none text-sm space-y-3">
                                <li className="flex gap-3 items-start">
                                    <div className="mt-1 w-2 h-2 rounded-full bg-[#BF0D3E] shrink-0"></div>
                                    <p><strong>Die Spinnen (Crawler/Spider):</strong> Kleine, unsichtbare Programme der Suchmaschinen kr krabbeln Tag und Nacht durchs Internet. Sie lesen Webseiten, folgen Links und sammeln alle Wörter, die sie finden.</p>
                                </li>
                                <li className="flex gap-3 items-start">
                                    <div className="mt-1 w-2 h-2 rounded-full bg-[#BF0D3E] shrink-0"></div>
                                    <p><strong>Der Index (Das Inhaltsverzeichnis):</strong> Die Crawler packen alle gefundenen Wörter in ein riesiges Inhaltsverzeichnis, den sogenannten "Index". Wenn du etwas suchst, durchsucht die Suchmaschine eigentlich nur diesen Index, nicht das Live-Internet. Deshalb geht das so blitzschnell!</p>
                                </li>
                                <li className="flex gap-3 items-start">
                                    <div className="mt-1 w-2 h-2 rounded-full bg-[#BF0D3E] shrink-0"></div>
                                    <p><strong>Der Algorithmus (Der Bibliothekar):</strong> Ein geheimes Rechenprogramm entscheidet dann, welche der Millionen gefundenen Seiten am besten zu deiner Suchanfrage passt und zeigt dir diese ganz oben an.</p>
                                </li>
                            </ul>
                        </div>

                        <div>
                            <h4 className="font-black text-xl text-slate-800 mb-3 flex items-center gap-2"><Icon name="target" size={24} className="text-[#BF0D3E]"/> 2. Die perfekten Suchbegriffe (Keywords)</h4>
                            <p className="text-sm mb-4 font-medium">Tippe niemals ganze Sätze oder Fragen in die Suchleiste ein! Suchmaschinen verstehen keine menschliche Sprache wie "bitte" oder "wie viel", sie verstehen <strong>Schlagwörter (Keywords)</strong> viel besser.</p>
                            <div className="space-y-3 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                <div className="flex gap-3 items-center text-sm">
                                    <span className="text-red-500 font-black text-lg">❌</span> 
                                    <p><span className="text-slate-500 italic">Falsch:</span> "Was fressen Eisbären eigentlich im kalten Winter, wenn sie Hunger haben?"</p>
                                </div>
                                <div className="flex gap-3 items-center text-sm">

                                    <span className="text-yellow-500 font-black text-lg">💡</span> 
                                    <p><strong>Der Synonym-Trick:</strong> Wenn du mit einem Wort nichts Passendes findest, nutze <strong>Synonyme</strong> (Wörter mit gleicher Bedeutung)! Finde z. B. statt "Auto" mal "KFZ", "Fahrzeug" oder "PKW".</p>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h4 className="font-black text-xl text-slate-800 mb-3 flex items-center gap-2"><Icon name="wand-2" size={24} className="text-[#BF0D3E]"/> 3. Die Profi-Tricks (Suchoperatoren)</h4>
                            <p className="text-sm mb-3 font-medium">Mit diesen kleinen unscheinbaren Zeichen zeigst du der Suchmaschine, wer der wahre Boss ist und grenzt deine Suche clever ein:</p>
                            <div className="grid gap-4 sm:grid-cols-2">
                                <div className="bg-white border-2 border-slate-100 p-4 rounded-2xl shadow-sm">
                                    <p className="font-black text-lg mb-1">Das Minus (-)</p>
                                    <p className="text-xs text-slate-500 mb-2">Schließt unerwünschte Wörter aus. Du suchst das Tier Jaguar, willst aber keine Autos sehen?</p>
                                    <code className="bg-slate-100 text-[#BF0D3E] px-2 py-1 rounded font-bold text-sm">Jaguar -Auto</code>
                                </div>
                                <div className="bg-white border-2 border-slate-100 p-4 rounded-2xl shadow-sm">
                                    <p className="font-black text-lg mb-1">Die Gänsefüßchen (" ")</p>
                                    <p className="text-xs text-slate-500 mb-2">Sucht exakt nach dieser Wortfolge. Gut für Zitate oder Namen.</p>
                                    <code className="bg-slate-100 text-[#BF0D3E] px-2 py-1 rounded font-bold text-sm">"Gymnasium Thomaeum"</code>
                                </div>
                                <div className="bg-white border-2 border-slate-100 p-4 rounded-2xl shadow-sm">

                                    <code className="bg-slate-100 text-[#BF0D3E] px-2 py-1 rounded font-bold text-sm">"Ich bin ein * holt mich hier raus"</code>

                        <div>

                                </li>
                                <li className="flex gap-3 items-start">
                                    <div className="mt-1 w-2 h-2 rounded-full bg-[#BF0D3E] shrink-0"></div>
                                    <p><strong>URL prüfen:</strong> Schau dir die grüne oder schwarze Internetadresse (URL) unter dem Titel an. Sieht die Adresse seriös aus? Handelt es sich um eine bekannte Zeitung, ein Lexikon oder eine seltsame, unbekannte Seite?</p>

                            <p className="text-sm mb-3">Google ist ein Riese, aber nicht immer die beste Wahl für Kinder und Jugendliche. Es gibt Suchmaschinen, die das Internet speziell für dich filtern und dir nur sichere, leicht verständliche und werbefreie Seiten zeigen:</p>

                                <a href="https://www.blinde-kuh.de/" target="_blank" className="bg-white hover:bg-slate-50 transition-colors px-3 py-1 rounded-full text-xs font-bold text-slate-700 shadow-sm border border-slate-200 cursor-pointer">Blinde-Kuh.de</a>

                            </div>
                            <p className="text-[11px] font-medium text-slate-600 mt-2 mb-2">Diese Suchmaschinen nutzen oft eine "Whitelist". Das bedeutet, sie zeigen nur Seiten an, die vorher von Pädagogen überprüft und für gut befunden wurden.</p>
                            <p className="text-[11px] font-medium text-slate-500 italic border-t border-red-200 pt-3 mt-2">
                                <strong>Datenschutz-Tipp für später:</strong> Fast jede Suche bei Google wird gespeichert. Wenn du mal privat suchen willst, ohne dass die Suchmaschine ein Profil von dir erstellt, probiere datensparsame Suchmaschinen wie <strong>DuckDuckGo.com</strong> oder <strong>Startpage.com</strong> aus!
                            </p>
                        </div>
                    </div>
                );

                    <div className="space-y-8 text-slate-700 leading-relaxed">
                        <div className="bg-green-50 p-5 rounded-3xl border border-green-100">
                            <h4 className="font-black text-green-800 text-lg flex items-center gap-2 mb-2"><Icon name="trophy" size={24} className="text-green-600"/> Text-Profi in Word!</h4>
                            <p className="text-sm font-medium text-green-700">Herzlichen Glückwunsch! Du weißt jetzt, wie man in Microsoft Word Texte tippt. Hier sind die geheimen Profi-Tricks für perfekte Referate:</p>
                        </div>

                        <div>
                            <h4 className="font-black text-xl text-slate-800 mb-3 flex items-center gap-2"><Icon name="undo-2" size={24} className="text-[#BF0D3E]"/> 1. Der magische Lebensretter</h4>
                            <p className="text-sm mb-3 font-medium">Oh nein! Du hast aus Versehen deinen halben Text gelöscht? Keine Panik!</p>

                                    <div className="mt-1 w-2 h-2 rounded-full bg-[#BF0D3E] shrink-0"></div>
                                    <p>Klicke ganz oben links in Word auf den <strong>gebogenen Pfeil nach links</strong>.</p>
                                </li>
                                <li className="flex gap-3 items-start">
                                    <div className="mt-1 w-2 h-2 rounded-full bg-[#BF0D3E] shrink-0"></div>
                                    <p><strong>Der Profi-Trick:</strong> Drücke auf deiner Tastatur gleichzeitig <code className="bg-slate-100 text-[#BF0D3E] px-2 py-1 rounded font-bold">Strg</code> und <code className="bg-slate-100 text-[#BF0D3E] px-2 py-1 rounded font-bold">Z</code>. Schwupps! Word macht deinen Fehler sofort rückgängig.</p>
                                </li>
                            </ul>
                        </div>

                        <div>
                            <h4 className="font-black text-xl text-slate-800 mb-3 flex items-center gap-2"><Icon name="list" size={24} className="text-[#BF0D3E]"/> 2. Ordnung schaffen mit Listen</h4>
                            <p className="text-sm mb-3 font-medium">Wenn du viele Informationen hast, benutze Listen! Das liest sich viel besser als ein riesiger Textblock.</p>

                                <li className="flex gap-3 items-start">
                                    <div className="mt-1 w-2 h-2 rounded-full bg-[#BF0D3E] shrink-0"></div>
                                    <p>Markiere deinen Text und klicke oben im Menü "Start" auf die <strong>Aufzählungszeichen</strong> (Punkte) oder auf die <strong>Nummerierung</strong> (1. 2. 3.).</p>

                        <div>

                            <h4 className="font-black text-xl text-slate-800 mb-3 flex items-center gap-2"><Icon name="file-warning" size={24} className="text-[#BF0D3E]"/> 4. Der rote Wellen-Alarm</h4>
                            <p className="text-sm mb-3 font-medium">Wenn unter einem Wort eine rote Wellenlinie auftaucht, hat Word einen Rechtschreibfehler entdeckt.</p>
                            <ul className="list-none text-sm space-y-3">
                                <li className="flex gap-3 items-start">
                                    <div className="mt-1 w-2 h-2 rounded-full bg-[#BF0D3E] shrink-0"></div>
                                    <p><strong>So korrigierst du es:</strong> Klicke mit der <strong>rechten Maustaste</strong> auf das Wort. Wähle das richtige Wort aus dem Menü.</p>
                                </li>
                            </ul>
                        </div>

                        <div className="bg-red-50 p-5 rounded-3xl border border-red-100">
                            <h4 className="font-black text-lg text-slate-800 mb-2 flex items-center gap-2"><Icon name="file-text" size={20} className="text-[#BF0D3E]"/> 5. Das PDF-Geheimnis</h4>
                            <p className="text-sm mb-3">Damit sich deine Hausaufgaben beim Lehrer auf dem PC nicht verschieben, speichere sie immer als PDF!</p>
                            <ul className="list-none text-sm space-y-3">
                                <li className="flex gap-3 items-start">
                                    <div className="mt-1 w-2 h-2 rounded-full bg-[#BF0D3E] shrink-0"></div>
                                    <p>Klicke auf <strong>Datei -> Speichern unter</strong> und wähle bei "Dateityp" in der Liste <strong>PDF</strong> aus.</p>
                                </li>
                            </ul>
                        </div>
                    </div>
                );
            }
            // Fallback für alle anderen Module, die noch keinen Text haben
            return (
                <div className="text-center py-12 px-4">
                    <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                        <Icon name="book-open" size={40} />
                    </div>
                    <h3 className="text-xl font-black text-slate-800 mb-2">Inhalte in Arbeit</h3>
                    <p className="text-slate-500 text-sm max-w-sm mx-auto">Der Wissensspeicher für dieses Modul wird gerade von deinen Lehrkräften geschrieben. Schau bald wieder vorbei!</p>
                </div>
            );
        }

        const App = () => {
            const [user, setUser] = useState(null);
            const [studentData, setStudentData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authRequired, setAuthRequired] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [activeStage, setActiveStage] = useState("5-6");
            
            // Zustand für das offene Modul (Modal)
            const [selectedModule, setSelectedModule] = useState(null);

            useEffect(() => {
                const bootstrap = async () => {
                    try {
                        await msalInitPromise;
                        await msalInstance.handleRedirectPromise();
                        
                        let activeAccount = msalInstance.getActiveAccount();
                        if (!activeAccount && msalInstance.getAllAccounts().length > 0) {
                            activeAccount = msalInstance.getAllAccounts()[0];
                            msalInstance.setActiveAccount(activeAccount);
                        }

                        if (activeAccount) {
                            setUser({ name: activeAccount.name, username: activeAccount.username });
                            fetchMyData(activeAccount);
                        } else {
                            setAuthRequired(true);
                            setLoading(false);
                        }
                    } catch (err) {
                        console.error(err);
                        setAuthRequired(true);
                        setLoading(false);
                    }
                };
                bootstrap();
            }, []);

            const handleLogin = () => {
                setLoading(true);
                msalInstance.loginRedirect({ scopes: ["Sites.Read.All"] });
            };

            const handleLogout = () => {
                msalInstance.logoutRedirect({ postLogoutRedirectUri: window.location.origin });
            };

            const fetchMyData = async (account) => {
                try {
                    const tokenRes = await msalInstance.acquireTokenSilent({ scopes: ["Sites.Read.All"], account });
                    const url = `https://graph.microsoft.com/v1.0/sites/${MS_CONFIG.siteId}/lists/${MS_CONFIG.listId}/items?$expand=fields&$top=999`;
                    const res = await fetch(url, { headers: { Authorization: `Bearer ${tokenRes.accessToken}` }});
                    
                    if (!res.ok) throw new Error("Fehler beim Abrufen der SharePoint-Daten.");
                    const data = await res.json();
                    
                    const myRecord = data.value.find(item => 
                        item.fields.Title && item.fields.Title.toLowerCase() === account.username.toLowerCase()
                    );

                    if (myRecord) {
                        const f = myRecord.fields;
                        const completedArray = f.Erledigte_Module ? f.Erledigte_Module.split(',').map(m => parseInt(m.trim())).filter(n => !isNaN(n)) : [];
                        
                        let parsedDates = {};
                        if (f.Modul_Daten) {
                            try { parsedDates = JSON.parse(f.Modul_Daten); } catch(e) {}
                        }

                        setStudentData({
                            vorname: f.Vorname || "",
                            nachname: f.Nachname || "",
                            klasse: f.Klasse || "",
                            completedTasks: completedArray,
                            moduleDates: parsedDates
                        });
                    } else {
                        setErrorMsg("Deine E-Mail-Adresse wurde noch nicht in die Datenbank eingetragen. Bitte melde dich bei deiner Lehrkraft.");
                    }
                } catch (error) {
                    if (error.name === "InteractionRequiredAuthError") {
                        msalInstance.loginRedirect({ scopes: ["Sites.Read.All"] });
                    } else {
                        setErrorMsg("Fehler beim Laden deiner Daten.");
                    }
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                        <div className="spinner mb-6"></div>
                        <p className="text-sm font-black uppercase text-slate-400 tracking-widest text-center">Lade Profil...</p>
                    </div>
                );
            }

            if (authRequired) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                        <div className="bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center border border-slate-100">
                            <div className="mx-auto w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6 text-[#BF0D3E] shadow-sm">
                                <Icon name="graduation-cap" size={40} />
                            </div>
                            <h2 className="text-2xl sm:text-3xl font-black mb-3 uppercase tracking-tighter text-slate-800">Medienpass</h2>
                            <p className="text-slate-500 mb-8 font-medium text-sm sm:text-base leading-relaxed">Bitte melde dich mit deiner Schul-E-Mail-Adresse an, um deinen Fortschritt zu sehen.</p>
                            <button 
                                onClick={handleLogin} 
                                className="w-full text-white font-black uppercase tracking-widest px-6 py-4 rounded-2xl transition-all shadow-lg active:scale-95" 
                                style={{ backgroundColor: THOMA_RED }}>
                                Anmelden
                            </button>
                        </div>
                    </div>
                );
            }

            if (errorMsg) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-xl max-w-md w-full text-center border border-red-100">
                            <div className="mx-auto w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-4 text-red-500">
                                <Icon name="user-x" size={32} />
                            </div>
                            <h2 className="text-xl font-black mb-2 text-slate-800">Kein Profil gefunden</h2>
                            <p className="text-slate-500 mb-6 text-sm">{errorMsg}</p>
                            <button onClick={handleLogout} className="bg-slate-100 text-slate-600 font-bold uppercase px-6 py-3 rounded-xl w-full">Abmelden</button>
                        </div>
                    </div>
                );
            }

            const totalCompleted = studentData ? studentData.completedTasks.length : 0;
            const progressPercent = Math.round((totalCompleted / 18) * 100);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 font-sans pb-10 relative">
                    
                    {/* OVERLAY / MODAL: Wissensspeicher */}
                    {selectedModule && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/40 backdrop-blur-sm">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden relative">
                                {/* Modal Header */}
                                <div className="bg-[#BF0D3E] text-white p-6 sm:p-8 flex justify-between items-center shrink-0">
                                    <div>
                                        <span className="text-red-200 text-[10px] font-black uppercase tracking-widest mb-1 block">Wissensspeicher • Modul {selectedModule.id}</span>
                                        <h2 className="text-2xl sm:text-3xl font-black tracking-tight">{selectedModule.title}</h2>
                                    </div>
                                    <button onClick={() => setSelectedModule(null)} className="flex items-center gap-2 bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-2xl transition-all shadow-sm active:scale-95 border border-white/30" title="Schließen">
                                        <Icon name="x" size={20} />
                                        <span className="font-bold uppercase tracking-wider text-xs hidden sm:inline">Schließen</span>
                                    </button>
                                </div>

                                {/* Modal Body (Scrollable) */}
                                <div className="p-6 sm:p-8 overflow-y-auto">
                                    {getModuleContent(selectedModule.id)}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header - Mobile Optimiert */}
                    <header className="bg-[#BF0D3E] text-white pt-12 pb-6 px-6 sm:px-8 shadow-md rounded-b-[2rem] sm:rounded-b-[3rem] relative z-10">
                        <div className="max-w-4xl mx-auto flex justify-between items-start">
                            <div className="mr-4">
                                <h1 className="text-3xl sm:text-4xl font-black uppercase tracking-tighter mb-1">Hallo {studentData?.vorname}!</h1>
                                <p className="text-red-200 font-bold text-sm sm:text-base opacity-90">Klasse {studentData?.klasse} • Gymnasium Thomaeum</p>
                            </div>
                            <button onClick={handleLogout} className="flex items-center gap-2 bg-white text-[#BF0D3E] hover:bg-slate-100 px-3 py-2 sm:px-4 sm:py-2.5 rounded-xl sm:rounded-2xl transition-all shadow-lg active:scale-95 shrink-0 mt-1 sm:mt-0" title="Abmelden">
                                <Icon name="log-out" size={16} className="sm:w-[18px] sm:h-[18px]" />
                                <span className="font-black uppercase tracking-wider text-[10px] sm:text-xs">Abmelden</span>
                            </button>
                        </div>
                        
                        {/* Fortschrittsbalken */}
                        <div className="max-w-4xl mx-auto mt-8 bg-black/10 p-5 rounded-3xl backdrop-blur-sm">
                            <div className="flex justify-between items-end mb-3">
                                <span className="font-black uppercase tracking-widest text-xs sm:text-sm text-white">Dein Fortschritt</span>
                                <span className="font-black text-2xl sm:text-3xl text-white">{progressPercent}%</span>
                            </div>
                            <div className="h-4 bg-black/20 rounded-full overflow-hidden shadow-inner relative">
                                <div className="h-full bg-white rounded-full transition-all duration-1000 ease-out relative z-10" style={{ width: `${progressPercent}%` }}></div>
                                {/* Trennlinien für die 3 Stufen (33% und 66%) */}
                                <div className="absolute top-0 bottom-0 left-[33.33%] w-1 bg-black/30 z-20"></div>
                                <div className="absolute top-0 bottom-0 left-[66.66%] w-1 bg-black/30 z-20"></div>
                            </div>
                            <p className="text-right mt-2 text-[10px] font-bold text-red-200 uppercase">{totalCompleted} von 18 Modulen geschafft</p>
                        </div>
                    </header>

                    {/* Content / Module */}
                    <main className="flex-grow max-w-4xl mx-auto w-full px-4 sm:px-8 mt-[-1rem] sm:mt-[-2rem] relative z-20">
                        
                        {/* Navigation für die Jahrgangsstufen */}
                        <div className="flex gap-3 mb-2 overflow-x-auto pb-4 scrollbar-hide pt-4 sm:pt-6">
                            {["5-6", "7-8", "9-10"].map(stage => (
                                <button 
                                    key={stage} 
                                    onClick={() => setActiveStage(stage)} 
                                    className={`px-6 py-3 rounded-2xl font-black transition-all whitespace-nowrap shadow-sm ${activeStage === stage ? 'text-white shadow-md scale-105' : 'bg-white text-slate-400 border border-slate-100 hover:bg-slate-50'}`} 
                                    style={activeStage === stage ? { backgroundColor: THOMA_RED } : {}}
                                >
                                    Klasse {stage}
                                </button>
                            ))}
                        </div>

                        <div className="mb-10">
                            <h3 className="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">
                                <Icon name="wrench" size={24} className="text-[#BF0D3E]" /> Skills (Anwendung)
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 sm:gap-6">
                                {ALL_MODULES.filter(m => m.stage === activeStage && m.category === 'skills').map(modul => {
                                    const isDone = studentData?.completedTasks.includes(modul.id);
                                    const moduleData = studentData?.moduleDates[modul.id];
                                    let dateDone = "—";
                                    let teacherName = "";
                                    if (moduleData) {
                                        if (typeof moduleData === 'string') { dateDone = moduleData; }
                                        else { dateDone = moduleData.datum || "—"; teacherName = moduleData.lehrer || ""; }
                                    }

                                    return (
                                        <div 
                                            key={modul.id} 
                                            onClick={() => { if (isDone) setSelectedModule(modul); }}
                                            className={`bg-white rounded-3xl p-5 sm:p-6 border-2 transition-all flex flex-col h-full ${isDone ? 'border-green-400 shadow-green-100 shadow-lg cursor-pointer hover:-translate-y-1 hover:shadow-xl' : 'border-slate-100 shadow-sm opacity-90'}`}
                                        >
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-[10px] font-black uppercase tracking-widest bg-slate-100 text-slate-500 px-3 py-1 rounded-lg">Klasse {modul.stage}</span>
                                                {isDone ? (
                                                    <div className="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white shadow-md">
                                                        <Icon name="check" size={16} />
                                                    </div>
                                                ) : (
                                                    <div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-300">
                                                        <Icon name="lock" size={14} />
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <h3 className={`font-black text-lg sm:text-xl tracking-tight leading-tight mb-2 ${isDone ? 'text-slate-800' : 'text-slate-500'}`}>
                                                {modul.title}
                                            </h3>
                                            
                                            <div className="mt-auto">
                                                {isDone ? (
                                                    <div>
                                                        <div className="text-xs font-bold text-green-600 flex flex-col gap-0.5 mt-3 mb-4">
                                                            <span className="flex items-center gap-1">
                                                                <Icon name="calendar-check" size={12} />
                                                                Zertifiziert am {dateDone}
                                                            </span>
                                                            {teacherName && <span className="text-[10px] text-green-700 ml-4">durch {teacherName}</span>}
                                                        </div>
                                                        <div className="pt-3 border-t border-slate-100 text-center">
                                                            <span className="text-[10px] font-black uppercase tracking-widest text-[#BF0D3E] flex items-center justify-center gap-2 group-hover:text-red-700">
                                                                <Icon name="book-open" size={14} /> Wissensspeicher öffnen
                                                            </span>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <p className="text-xs font-medium text-slate-400 mt-3">
                                                        Noch nicht freigeschaltet.
                                                    </p>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="mb-4">
                            <h3 className="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">
                                <Icon name="brain" size={24} className="text-[#BF0D3E]" /> Reflexion (Umgang)
                            </h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 sm:gap-6">
                                {ALL_MODULES.filter(m => m.stage === activeStage && m.category === 'reflexion').map(modul => {
                                    const isDone = studentData?.completedTasks.includes(modul.id);
                                    const moduleData = studentData?.moduleDates[modul.id];
                                    let dateDone = "—";
                                    let teacherName = "";
                                    if (moduleData) {
                                        if (typeof moduleData === 'string') { dateDone = moduleData; }
                                        else { dateDone = moduleData.datum || "—"; teacherName = moduleData.lehrer || ""; }
                                    }

                                    return (
                                        <div 
                                            key={modul.id} 
                                            onClick={() => { if (isDone) setSelectedModule(modul); }}
                                            className={`bg-white rounded-3xl p-5 sm:p-6 border-2 transition-all flex flex-col h-full ${isDone ? 'border-green-400 shadow-green-100 shadow-lg cursor-pointer hover:-translate-y-1 hover:shadow-xl' : 'border-slate-100 shadow-sm opacity-90'}`}
                                        >
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-[10px] font-black uppercase tracking-widest bg-slate-100 text-slate-500 px-3 py-1 rounded-lg">Klasse {modul.stage}</span>
                                                {isDone ? (
                                                    <div className="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white shadow-md">
                                                        <Icon name="check" size={16} />
                                                    </div>
                                                ) : (
                                                    <div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-300">
                                                        <Icon name="lock" size={14} />
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <h3 className={`font-black text-lg sm:text-xl tracking-tight leading-tight mb-2 ${isDone ? 'text-slate-800' : 'text-slate-500'}`}>
                                                {modul.title}
                                            </h3>
                                            
                                            <div className="mt-auto">
                                                {isDone ? (
                                                    <div>
                                                        <div className="text-xs font-bold text-green-600 flex flex-col gap-0.5 mt-3 mb-4">
                                                            <span className="flex items-center gap-1">
                                                                <Icon name="calendar-check" size={12} />
                                                                Zertifiziert am {dateDone}
                                                            </span>
                                                            {teacherName && <span className="text-[10px] text-green-700 ml-4">durch {teacherName}</span>}
                                                        </div>
                                                        <div className="pt-3 border-t border-slate-100 text-center">
                                                            <span className="text-[10px] font-black uppercase tracking-widest text-[#BF0D3E] flex items-center justify-center gap-2 group-hover:text-red-700">
                                                                <Icon name="book-open" size={14} /> Wissensspeicher öffnen
                                                            </span>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <p className="text-xs font-medium text-slate-400 mt-3">
                                                        Noch nicht freigeschaltet.
                                                    </p>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
