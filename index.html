<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medienpass Thomaeum</title>
    
    <!-- Lade alle benötigten Bibliotheken -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- GANZ WICHTIG: Die Microsoft Graph / Login Bibliothek -->
    <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.32.2/js/msal-browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --thomaeum-red: #BF0D3E; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // DIE 4 FINALEN IDs (Bereits für dich eingetragen)
        // ==========================================
        const MS_CONFIG = {
            tenantId: "09c4bd58-1b8c-410d-930e-816015e61028",
            clientId: "7d277b19-93c1-4df7-8f1b-d38749b3d440",
            siteId: "thomaeumde.sharepoint.com,9ef17c4d-b57b-482e-9168-3cc3bc43bc3d,d600d53b-cfd0-45f7-96a5-f1ac20222f8f",
            listId: "08da02d9-5b67-4938-9d7e-9e9dee97fa2e"
        };

        const THOMA_RED = "#BF0D3E";

        // MSAL Konfiguration für Graph API (GEFIXT GEGEN ENDLOSSCHLEIFEN)
        const msalConfig = {
            auth: {
                clientId: MS_CONFIG.clientId,
                authority: `https://login.microsoftonline.com/${MS_CONFIG.tenantId}`,
                redirectUri: window.location.origin, // Zwingt zur exakten Rückkehr
                navigateToLoginRequestUrl: true
            },
            cache: {
                cacheLocation: "localStorage", // WICHTIG: Speichert auch über Redirects hinweg
                storeAuthStateInCookie: true,  // WICHTIG: Gegen strenge Browser-Blocker
            }
        };
        const msalInstance = new msal.PublicClientApplication(msalConfig);

        const Icon = ({ name, size = 24, className = "", color = "currentColor" }) => {
            const icons = {
                shield: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>,
                award: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7" /><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" /></svg>,
                check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12" /></svg>,
                clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>,
                user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>,
                tool: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19 7-7 3 3-7 7-3-3z" /><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" /></svg>,
                globe: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>,
                refresh: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
            };
            return icons[name] || null;
        };

        const curriculumData = {
            "5-6": {
                tasks: [
                    { id: 1, category: "Anwendung", title: "Hardware-Führerschein", desc: "Geräte sicher bedienen." },
                    { id: 2, category: "Anwendung", title: "Dateimanagement", desc: "Ordner & Cloud-Strukturen." },
                    { id: 3, category: "Anwendung", title: "Textverarbeitung I", desc: "Layouts & PDF-Export." },
                    { id: 4, category: "Umgang", title: "Netiquette", desc: "Regeln im Klassenchat." },
                    { id: 5, category: "Umgang", title: "Prävention", desc: "Umgang mit Cybermobbing." },
                    { id: 6, category: "Umgang", title: "Suchmaschinen", desc: "Sicher recherchieren." }
                ]
            },
            "7-8": {
                tasks: [
                    { id: 7, category: "Anwendung", title: "Präsentationsprofi", desc: "Foliendesign & Vortrag." },
                    { id: 8, category: "Anwendung", title: "Medienproduktion", desc: "Video- & Bildschnitt." },
                    { id: 9, category: "Anwendung", title: "Tabellenkalkulation", desc: "Daten visualisieren." },
                    { id: 10, category: "Umgang", title: "Urheberrecht", desc: "Lizenzen & Bildrechte." },
                    { id: 11, category: "Umgang", title: "Quellenkritik", desc: "Fake News erkennen." },
                    { id: 12, category: "Umgang", title: "Datenschutz", desc: "Privatsphäre & Tracker." }
                ]
            },
            "9-10": {
                tasks: [
                    { id: 13, category: "Anwendung", title: "KI-Produktivität", desc: "Prompt-Engineering." },
                    { id: 14, category: "Anwendung", title: "Digitale Bewerbung", desc: "E-Portfolio & Profile." },
                    { id: 15, category: "Anwendung", title: "Projektmanagement", desc: "Agiles Arbeiten." },
                    { id: 16, category: "Umgang", title: "KI-Ethik", desc: "Folgen von Algorithmen." },
                    { id: 17, category: "Umgang", title: "Zivilcourage", desc: "Hate Speech kontern." },
                    { id: 18, category: "Umgang", title: "Digitaler Fußabdruck", desc: "Eigene Biografie." }
                ]
            }
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [completedTasks, setCompletedTasks] = useState([]);
            const [activeStage, setActiveStage] = useState("5-6");
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);
            const [debugMsg, setDebugMsg] = useState("");
            const [authRequired, setAuthRequired] = useState(false);

            useEffect(() => {
                const initApp = async () => {
                    try {
                        // 1. MSAL initialisieren
                        await msalInstance.initialize();
                        
                        // 2. Prüfen, ob wir gerade von einem Redirect zurückkommen
                        let redirectResponse = null;
                        try {
                            redirectResponse = await msalInstance.handleRedirectPromise();
                            if (redirectResponse && redirectResponse.account) {
                                // WICHTIG: Das Konto als AKTIV setzen, damit es nicht vergessen wird!
                                msalInstance.setActiveAccount(redirectResponse.account);
                                console.log("Redirect-Login erfolgreich verarbeitet!");
                            }
                        } catch (redirectErr) {
                            console.error("Redirect Error:", redirectErr);
                            setDebugMsg(`Fehler nach Weiterleitung: ${redirectErr.message.split(':')[0]}`);
                        }
                        
                        // 3. Den Office 365 Nutzer über Azure Static Web Apps abfragen
                        let swaUser = null;
                        try {
                            const authUrl = new URL('/.auth/me', window.location.origin).toString();
                            const response = await fetch(authUrl);
                            if (response.ok) {
                                const payload = await response.json();
                                swaUser = payload.clientPrincipal;
                            }
                        } catch (fetchErr) {
                             console.log("Läuft lokal oder SWA Auth nicht erreichbar.");
                        }

                        // Falls Azure SWA fehlt, versuchen wir den Namen aus dem MSAL-Konto zu ziehen
                        const activeAcc = msalInstance.getActiveAccount() || msalInstance.getAllAccounts()[0];
                        if (!swaUser && activeAcc) {
                            swaUser = { userDetails: activeAcc.username };
                        }
                        
                        if (swaUser) {
                            setUser(swaUser);
                            
                            // 4. Daten laden (Wenn wir direkt aus einem Redirect kommen, nutzen wir sofort den frischen Token!)
                            if (redirectResponse && redirectResponse.accessToken) {
                                fetchSharePointData(swaUser.userDetails, false, redirectResponse.accessToken);
                            } else {
                                fetchSharePointData(swaUser.userDetails, false);
                            }
                        } else {
                            setUser({ userDetails: "Gast-Nutzer (Nicht eingeloggt)" });
                            setLoading(false);
                        }
                    } catch (err) {
                        console.error("Auth-Fehler:", err);
                        setDebugMsg("Initialisierung fehlgeschlagen.");
                        setLoading(false);
                    }
                };
                initApp();
            }, []);

            // ==========================================
            // LOGIK: ABRUF VON MICROSOFT LISTS
            // ==========================================
            const fetchSharePointData = async (userEmail, forceRedirect = false, preFetchedToken = null) => {
                setSyncing(true);
                setDebugMsg(forceRedirect ? "Leite zu Microsoft weiter..." : "Verbinde mit Microsoft Graph...");
                
                try {
                    const tokenRequest = { scopes: ["Sites.Read.All"], loginHint: userEmail };
                    let token = preFetchedToken;
                    
                    if (!token) {
                        try {
                            if (forceRedirect) {
                                // Die Seite lädt hier komplett neu
                                await msalInstance.loginRedirect(tokenRequest);
                                return;
                            } else {
                                // Versuche bekannte Konten zu nutzen
                                const accounts = msalInstance.getAllAccounts();
                                if (accounts.length > 0) {
                                    msalInstance.setActiveAccount(accounts[0]); // Sicherstellen, dass es aktiv ist
                                    tokenRequest.account = accounts[0];
                                    const tokenResponse = await msalInstance.acquireTokenSilent(tokenRequest);
                                    token = tokenResponse.accessToken;
                                } else {
                                    // Wenn nichts lokal ist, leiser SSO Versuch (wird meist blockiert)
                                    const tokenResponse = await msalInstance.ssoSilent(tokenRequest);
                                    token = tokenResponse.accessToken;
                                }
                            }
                        } catch (err) {
                            console.log("Leiser Login fehlgeschlagen, Nutzer-Interaktion nötig:", err);
                            setDebugMsg("Einmalige Freigabe erforderlich.");
                            setAuthRequired(true);
                            setLoading(false);
                            setSyncing(false);
                            return; // Stoppt hier und zeigt den Verbinden-Button
                        }
                    }

                    // Ab hier haben wir 100%ig einen Token!
                    setAuthRequired(false);
                    setDebugMsg("Datenabruf gestartet...");

                    const graphUrl = `https://graph.microsoft.com/v1.0/sites/${MS_CONFIG.siteId}/lists/${MS_CONFIG.listId}/items?$expand=fields`;
                    
                    const res = await fetch(graphUrl, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        
                        const studentRow = data.value.find(item => 
                            item.fields.Title && 
                            item.fields.Title.toLowerCase() === userEmail.toLowerCase()
                        );
                        
                        if (studentRow) {
                            if (studentRow.fields.Erledigte_Module) {
                                const modulesArray = studentRow.fields.Erledigte_Module.split(',').map(m => parseInt(m.trim()));
                                setCompletedTasks(modulesArray);
                                setDebugMsg("Daten erfolgreich geladen!");
                            } else {
                                setDebugMsg("Schüler gefunden, aber noch keine Module erledigt.");
                            }
                        } else {
                            setDebugMsg(`Willkommen! Dein Account ist bereit.`);
                        }
                    } else {
                        const errorData = await res.text();
                        console.error("Graph API Fehler:", errorData);
                        setDebugMsg(`Fehler beim Abruf: ${res.status}. Liste nicht gefunden oder keine Rechte.`);
                    }

                } catch (error) {
                    console.error("Fehler bei SharePoint Synchronisation:", error);
                    setDebugMsg(`Verbindungsfehler: ${error.message}`);
                } finally {
                    setLoading(false);
                    setSyncing(false);
                    setTimeout(() => {
                        setDebugMsg(prev => (prev === "Daten erfolgreich geladen!" || prev.includes("Willkommen")) ? "" : prev);
                    }, 3000);
                }
            };

            const progressValue = Math.round((completedTasks.length / 18) * 100);

            // Der gesicherte Login-Screen
            if (authRequired) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-full text-center border">
                            <div className="mx-auto w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mb-6 text-red-600">
                                <Icon name="shield" size={48} />
                            </div>
                            <h2 className="text-2xl font-black mb-4 uppercase tracking-tighter text-slate-800">Datenzugriff erlauben</h2>
                            <p className="text-slate-500 mb-8 font-medium">Damit der Medienpass deinen Fortschritt aus der Datenbank laden kann, musst du einmalig die Verbindung bestätigen.</p>
                            <button 
                                onClick={() => { setLoading(true); fetchSharePointData(user.userDetails, true); }}
                                className="w-full text-white font-black uppercase px-8 py-4 rounded-2xl transition-all shadow-lg hover:scale-105 active:scale-95"
                                style={{ backgroundColor: THOMA_RED }}
                            >
                                Mit Microsoft verbinden
                            </button>
                        </div>
                    </div>
                );
            }

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-12 h-12 border-4 border-slate-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Lade App...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 font-sans selection:bg-red-100 relative">
                    {debugMsg && (
                        <div className={`w-full text-center py-2 text-xs font-bold ${debugMsg.includes('Fehler') || debugMsg.includes('Kein Eintrag') ? 'bg-red-600 text-white' : 'bg-green-500 text-white'}`}>
                            DIAGNOSE: {debugMsg}
                        </div>
                    )}
                    
                    <header className="bg-white border-b h-20 flex items-center justify-between px-8 shadow-sm sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <div className="p-2 rounded-xl text-white shadow-lg shadow-red-100 flex items-center justify-center" style={{ backgroundColor: THOMA_RED }}>
                                <Icon name="shield" size={28} color="white" />
                            </div>
                            <h1 className="font-black text-xl uppercase tracking-tighter">Medienpass <span style={{ color: THOMA_RED }}>Thomaeum</span></h1>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="text-right hidden sm:block">
                                <p className="text-[10px] font-black text-blue-600 uppercase leading-none mb-1 flex items-center justify-end gap-1">
                                    {syncing ? <Icon name="refresh" size={10} className="animate-spin" /> : "MS Graph:"} 
                                    {syncing ? "Synct..." : "Aktiv"}
                                </p>
                                <p className="text-xs font-bold text-slate-700">{user?.userDetails || 'Anonym'}</p>
                            </div>
                            <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 border-2 border-white shadow-sm overflow-hidden">
                                <Icon name="user" size={20} />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-8 flex-grow">
                        <div className="animate-in fade-in duration-700">
                            
                            <div className="rounded-[3rem] p-12 text-white shadow-2xl mb-12 relative overflow-hidden flex flex-col md:flex-row items-center justify-between" style={{ backgroundColor: THOMA_RED }}>
                                <div className="relative z-10">
                                    <h2 className="text-xl font-black mb-3 tracking-tight uppercase opacity-80">Portfolio von:</h2>
                                    <div className="text-3xl md:text-4xl font-black mb-6 tracking-tighter uppercase text-white bg-white/10 px-8 py-4 rounded-[2rem] border-2 border-dashed border-white/30 inline-block">
                                        {user?.userDetails || '[Name laden...]'}
                                    </div>
                                    <p className="text-red-100 text-lg max-w-md font-medium leading-relaxed italic">
                                        Die Daten werden live aus dem zentralen Microsoft-System deiner Schule geladen.
                                    </p>
                                </div>
                                
                                <div className="bg-white/10 p-8 rounded-[2.5rem] backdrop-blur-md text-center border border-white/20 shadow-inner min-w-[220px] mt-8 md:mt-0">
                                    <div className="text-[10px] font-black uppercase tracking-[0.2em] mb-2 text-red-200">Dein Fortschritt</div>
                                    <div className="text-7xl font-black mb-4 text-white">{progressValue}%</div>
                                    <div className="h-2 w-full bg-white/20 rounded-full overflow-hidden relative">
                                        <div className="bg-white h-full transition-all duration-1000" style={{ width: `${progressValue}%` }}></div>
                                    </div>
                                </div>
                                <div className="absolute -right-20 -bottom-20 opacity-5 pointer-events-none">
                                    <Icon name="award" size={400} color="white" />
                                </div>
                            </div>

                            <div className="flex gap-3 mb-12 overflow-x-auto pb-4 scrollbar-hide">
                                {Object.keys(curriculumData).map(k => (
                                    <button 
                                        key={k} 
                                        onClick={() => setActiveStage(k)} 
                                        className={`px-10 py-5 rounded-[2rem] font-black transition-all whitespace-nowrap shadow-sm hover:shadow-md ${activeStage === k ? 'text-white scale-105 shadow-xl shadow-red-100' : 'bg-white text-slate-400 hover:bg-slate-100'}`}
                                        style={activeStage === k ? { backgroundColor: THOMA_RED } : {}}
                                    >
                                        KLASSE {k}
                                    </button>
                                ))}
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-x-16 gap-y-12">
                                {["Anwendung", "Umgang"].map(cat => (
                                    <section key={cat}>
                                        <div className="flex items-center gap-4 mb-8">
                                            <div className={cat === "Anwendung" ? "bg-green-100 text-green-600 p-3 rounded-2xl flex items-center justify-center" : "bg-red-50 p-3 rounded-2xl flex items-center justify-center"} style={cat === "Umgang" ? {color: THOMA_RED} : {}}>
                                                {cat === "Anwendung" ? <Icon name="tool" size={28} /> : <Icon name="globe" size={28} />}
                                            </div>
                                            <h3 className="text-2xl font-black uppercase tracking-tighter text-slate-800">
                                                {cat === "Anwendung" ? "Skills (Anwendung)" : "Reflexion (Umgang)"}
                                            </h3>
                                        </div>
                                        <div className="space-y-6">
                                            {curriculumData[activeStage].tasks.filter(t => t.category === cat).map(t => {
                                                const done = completedTasks.includes(t.id);
                                                return (
                                                    <div 
                                                        key={t.id} 
                                                        className={`p-8 rounded-[2.5rem] border-2 transition-all flex gap-6 relative overflow-hidden ${done ? 'bg-green-50 border-green-500 border-l-[12px] shadow-lg shadow-green-100' : 'border-slate-100 bg-white shadow-sm'}`}
                                                        style={!done ? { borderLeftColor: THOMA_RED, borderLeftWidth: '8px' } : {}}
                                                    >
                                                        <div className={done ? 'text-green-600 flex items-center justify-center' : 'text-slate-200 flex items-center justify-center'}>
                                                            {done ? <Icon name="check" size={36} /> : <Icon name="clock" size={36} />}
                                                        </div>
                                                        <div className="flex-1">
                                                            <h4 className={`font-black text-xl mb-1 ${done ? 'text-green-900' : 'text-slate-900'}`}>{t.title}</h4>
                                                            <p className={`text-sm font-medium leading-relaxed ${done ? 'text-green-700/70' : 'text-slate-400'}`}>
                                                                {done ? "Zertifiziert & in der Datenbank hinterlegt." : t.desc}
                                                            </p>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
